apiVersion: apps/v1
kind: Deployment
metadata:
  name: spec-library
  labels:
    app: spec-library
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spec-library
  template:
    metadata:
      labels:
        app: spec-library
    spec:
      containers:
        - name: spec-library
          image: spec-library:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: PORT
              value: "8080"
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: spec-library-secrets
                  key: github-token
            - name: GITHUB_ORG
              valueFrom:
                configMapKeyRef:
                  name: spec-library-config
                  key: github-org
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
